<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI助手管理后台</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue-50:  #eff6ff;
      --blue-100: #dbeafe;
      --blue-200: #bfdbfe;
      --blue-500: #3b82f6;
      --blue-600: #2563eb;
      --blue-700: #1d4ed8;
      --gray-50:  #f9fafb;
      --gray-100: #f3f4f6;
      --gray-200: #e5e7eb;
      --gray-300: #d1d5db;
      --gray-400: #9ca3af;
      --gray-500: #6b7280;
      --gray-700: #374151;
      --gray-900: #111827;
      --red-100:  #fee2e2;
      --red-600:  #dc2626;
      --white:    #ffffff;
      --radius:   8px;
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      font-size: 16px;
      color: var(--gray-900);
      background: var(--gray-50);
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────────────── */
    .header {
      flex-shrink: 0;
      background: var(--white);
      border-bottom: 1px solid var(--gray-200);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .header-brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }
    .header-avatar-fallback {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: var(--blue-600);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--white);
      flex-shrink: 0;
    }
    .header-title { font-size: 20px; font-weight: 500; color: var(--gray-900); line-height: 1.4; }
    .header-subtitle { font-size: 13px; color: var(--gray-500); margin-top: 1px; }

    /* ── Main body ────────────────────────────────────────── */
    .body {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── Sidebar ─────────────────────────────────────────── */
    .sidebar {
      width: 256px;
      flex-shrink: 0;
      border-right: 1px solid var(--gray-200);
      background: var(--gray-50);
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }
    .sidebar-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--gray-200);
      flex-shrink: 0;
    }
    .btn-new-conv {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 16px;
      background: var(--blue-600);
      color: var(--white);
      border: none;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-new-conv:hover { background: var(--blue-700); }
    .conv-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    .conv-item {
      width: 100%;
      text-align: left;
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 10px 12px;
      border-radius: var(--radius);
      border: 1px solid transparent;
      background: transparent;
      cursor: pointer;
      transition: background 0.15s;
      margin-bottom: 4px;
    }
    .conv-item:hover:not(.active) { background: var(--gray-100); }
    .conv-item.active {
      background: var(--blue-50);
      border-color: var(--blue-200);
    }
    .conv-item-icon { color: var(--gray-500); flex-shrink: 0; margin-top: 2px; }
    .conv-item-content { flex: 1; min-width: 0; }
    .conv-item-title {
      font-size: 13px;
      color: var(--gray-900);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 400;
    }
    .conv-item-time { font-size: 11px; color: var(--gray-500); margin-top: 2px; }
    .conv-item-assistant { font-size: 11px; color: var(--gray-400); margin-top: 2px; }

    /* ── Right panel ─────────────────────────────────────── */
    .right-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Assistant selector ──────────────────────────────── */
    .assistant-selector {
      flex-shrink: 0;
      display: flex;
      gap: 8px;
      padding: 10px 24px;
      border-bottom: 1px solid var(--gray-200);
      background: var(--white);
      overflow-x: auto;
    }
    .assistant-selector::-webkit-scrollbar { height: 4px; }
    .assistant-selector::-webkit-scrollbar-track { background: transparent; }
    .assistant-selector::-webkit-scrollbar-thumb { background: var(--gray-200); border-radius: 2px; }
    .btn-assistant {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-radius: var(--radius);
      border: 1px solid var(--gray-200);
      background: var(--gray-50);
      color: var(--gray-700);
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    .btn-assistant:hover:not(.active) { background: var(--gray-100); }
    .btn-assistant.active {
      background: var(--blue-50);
      color: var(--blue-600);
      border-color: var(--blue-200);
    }
    .btn-assistant img,
    .btn-assistant .asst-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      flex-shrink: 0;
      object-fit: cover;
    }
    .asst-avatar {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      color: var(--white);
    }

    /* ── Message area ────────────────────────────────────── */
    .message-area {
      flex: 1;
      overflow-y: auto;
      background: var(--white);
    }
    .message-area::-webkit-scrollbar { width: 6px; }
    .message-area::-webkit-scrollbar-track { background: transparent; }
    .message-area::-webkit-scrollbar-thumb { background: var(--gray-200); border-radius: 3px; }
    .message-inner {
      max-width: 880px;
      margin: 0 auto;
      padding: 24px;
    }
    .message-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 300px;
      color: var(--gray-400);
      gap: 12px;
    }
    .message-empty svg { opacity: 0.5; }
    .message-empty p { font-size: 16px; }
    .message-list { display: flex; flex-direction: column; gap: 24px; }

    .msg-row { display: flex; gap: 16px; }
    .msg-row.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .msg-avatar.user-av { background: var(--blue-100); color: var(--blue-600); }
    .msg-avatar.bot-av  { background: var(--gray-100); color: var(--gray-600); }
    .msg-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

    .msg-body { flex: 1; max-width: 560px; }
    .msg-bubble {
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 13px;
      line-height: 1.7;
      white-space: pre-wrap;
    }
    .msg-bubble.user { background: var(--blue-50); color: var(--gray-900); }
    .msg-bubble.bot  { background: var(--gray-50);  color: var(--gray-900); }
    .msg-time { font-size: 11px; color: var(--gray-400); margin-top: 4px; padding: 0 4px; }

    .suggested-questions { margin-top: 14px; display: flex; gap: 16px; }
    .sq-spacer { width: 32px; flex-shrink: 0; }
    .sq-list { display: flex; flex-direction: column; gap: 8px; }
    .sq-label { font-size: 11px; color: var(--gray-500); margin-bottom: 4px; }
    .btn-sq {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: var(--gray-50);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      font-size: 13px;
      color: var(--gray-700);
      cursor: pointer;
      transition: background 0.15s;
      text-align: left;
    }
    .btn-sq:hover { background: var(--gray-100); }
    .btn-sq svg { flex-shrink: 0; color: var(--gray-400); }
    .btn-sq:hover svg { color: var(--gray-600); }

    /* ── Input area ──────────────────────────────────────── */
    .input-area {
      flex-shrink: 0;
      border-top: 1px solid var(--gray-200);
      background: var(--white);
      padding: 16px 24px;
    }
    .input-inner {
      max-width: 880px;
      margin: 0 auto;
      display: flex;
      gap: 16px;
    }
    .input-spacer { width: 32px; flex-shrink: 0; }
    .input-wrapper {
      flex: 1;
      max-width: 560px;
      position: relative;
    }
    textarea.chat-input {
      width: 100%;
      min-height: 120px;
      max-height: 240px;
      padding: 12px 16px 56px;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      font-size: 14px;
      font-family: inherit;
      color: var(--gray-900);
      resize: none;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      line-height: 1.6;
    }
    textarea.chat-input::placeholder { color: var(--gray-400); }
    textarea.chat-input:focus {
      border-color: var(--blue-500);
      box-shadow: 0 0 0 2px rgba(59,130,246,0.15);
    }
    .input-actions-left {
      position: absolute;
      bottom: 10px;
      left: 14px;
    }
    .input-actions-right {
      position: absolute;
      bottom: 10px;
      right: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .btn-icon {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius);
      border: none;
      cursor: pointer;
      transition: background 0.15s;
      background: var(--gray-100);
      color: var(--gray-600);
    }
    .btn-icon:hover { background: var(--gray-200); }
    .btn-icon.recording {
      background: var(--red-100);
      color: var(--red-600);
    }
    .btn-icon.recording:hover { background: #fecaca; }
    .btn-send {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius);
      border: none;
      cursor: pointer;
      transition: background 0.15s;
      background: var(--blue-600);
      color: var(--white);
    }
    .btn-send:hover:not(:disabled) { background: var(--blue-700); }
    .btn-send:disabled { background: var(--gray-300); cursor: not-allowed; }
    .recording-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      font-size: 13px;
      color: var(--red-600);
    }
    .recording-dot {
      width: 8px;
      height: 8px;
      background: var(--red-600);
      border-radius: 50%;
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* scrollbar general */
    * { scrollbar-width: thin; scrollbar-color: var(--gray-200) transparent; }
  </style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <header class="header">
    <div class="header-brand">
      <div id="header-avatar-wrap">
        <div class="header-avatar-fallback">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/>
          </svg>
        </div>
      </div>
      <div>
        <div class="header-title">AI助手</div>
        <div class="header-subtitle" id="header-subtitle">当前: 运营助手</div>
      </div>
    </div>
  </header>

  <!-- Body -->
  <div class="body">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <button class="btn-new-conv" id="btn-new-conv">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          新建对话
        </button>
      </div>
      <div class="conv-list" id="conv-list"></div>
    </aside>

    <!-- Right panel -->
    <div class="right-panel">

      <!-- Assistant selector -->
      <div class="assistant-selector" id="assistant-selector"></div>

      <!-- Message area -->
      <div class="message-area" id="message-area">
        <div class="message-inner">
          <div class="message-empty" id="msg-empty">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/>
            </svg>
            <p>选择助手开始对话</p>
          </div>
          <div class="message-list" id="message-list" style="display:none"></div>
        </div>
      </div>

      <!-- Input area -->
      <div class="input-area">
        <div class="input-inner">
          <div class="input-spacer"></div>
          <div class="input-wrapper">
            <textarea class="chat-input" id="chat-input" placeholder="输入您的问题…" rows="4"></textarea>
            <div class="input-actions-left">
              <button class="btn-icon" id="btn-attach" title="上传文件">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
                </svg>
              </button>
            </div>
            <div class="input-actions-right">
              <button class="btn-icon" id="btn-mic" title="语音输入">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/>
                </svg>
              </button>
              <button class="btn-send" id="btn-send" disabled title="发送">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
                </svg>
              </button>
            </div>
            <div class="recording-indicator" id="recording-indicator" style="display:none">
              <div class="recording-dot"></div>
              <span>正在录音…</span>
            </div>
          </div>
        </div>
      </div>

    </div><!-- /right-panel -->
  </div><!-- /body -->
</div><!-- /app -->

<script>
// ── Data ────────────────────────────────────────────────────────────────
const ASSISTANT_COLORS = ['#2563eb','#7c3aed','#059669','#d97706','#dc2626','#0891b2','#65a30d','#db2777'];

const ASSISTANTS = [
  { id:'operations',   name:'运营助手',   desc:'协助运营管理',   color:ASSISTANT_COLORS[0] },
  { id:'training',     name:'培训助手',   desc:'员工培训指导',   color:ASSISTANT_COLORS[1] },
  { id:'admin',        name:'行政助手',   desc:'行政事务处理',   color:ASSISTANT_COLORS[2] },
  { id:'safety',       name:'安全稽查助手', desc:'安全检查监督', color:ASSISTANT_COLORS[3] },
  { id:'copywriting',  name:'文案助手',   desc:'文案创作支持',   color:ASSISTANT_COLORS[4] },
  { id:'legal',        name:'法务助手',   desc:'法律咨询服务',   color:ASSISTANT_COLORS[5] },
  { id:'materials',    name:'物资助手',   desc:'物资管理协助',   color:ASSISTANT_COLORS[6] },
  { id:'psychology',   name:'心理咨询助手', desc:'心理健康支持', color:ASSISTANT_COLORS[7] },
];

const SUGGESTED = {
  operations: ['如何提高公交线路的运营效率?','客流高峰期应该如何调度车辆?','如何优化站点设置以提升乘客体验?'],
  training:   ['新员工入职培训需要准备哪些材料?','驾驶员安全培训的核心内容有哪些?','如何组织有效的服务礼仪培训?'],
  admin:      ['办公用品采购流程是怎样的?','如何申请员工休假?','会议室预订有什么要求?'],
};

const DEFAULT_SUGGESTED = ['能否详细说明具体的实施步骤?','这个方案的预期效果如何?','需要准备哪些资源和支持?'];

let state = {
  selectedAssistant: 'operations',
  activeConvId: 'conv-1',
  isRecording: false,
  conversations: [
    { id:'conv-1', title:'如何优化早高峰调度方案',   time:'2026-04-28 09:30', assistant:'运营助手' },
    { id:'conv-2', title:'新员工培训计划制定',         time:'2026-04-27 14:20', assistant:'培训助手' },
    { id:'conv-3', title:'安全检查标准流程咨询',       time:'2026-04-26 16:45', assistant:'安全稽查助手' },
  ],
  messagesByConv: {
    'conv-1': [
      { id:'m1', role:'user',      content:'如何优化早高峰时段的车辆调度方案?', time:'09:30' },
      { id:'m2', role:'assistant', content:'针对早高峰时段的车辆调度优化,我建议从以下几个方面着手:\n\n1. 数据分析:首先需要收集和分析历史客流数据,识别高峰时段的具体时间段和重点线路。\n\n2. 弹性调度:根据客流规律,在高峰前30分钟增加发车频次,可以提升20-30%的运力。\n\n3. 快慢车组合:设置大站快车和常规线路相结合,分流不同需求的乘客。\n\n4. 实时监控:利用GPS和客流监测系统,实时调整发车间隔,避免车辆扎堆。', time:'09:31',
        suggested:['如何提高公交线路的运营效率?','客流高峰期应该如何调度车辆?','如何优化站点设置以提升乘客体验?'] },
    ],
    'conv-2': [],
    'conv-3': [],
  },
};

// ── Helpers ──────────────────────────────────────────────────────────────
function getAssistant(id) { return ASSISTANTS.find(a => a.id === id); }

function nowTime() {
  return new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
}
function nowDateTime() {
  return new Date().toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
}

function avatarEl(asst, size=28) {
  const el = document.createElement('div');
  el.className = 'asst-avatar';
  el.style.cssText = `width:${size}px;height:${size}px;background:${asst.color};border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:${Math.round(size*0.38)}px;font-weight:600;flex-shrink:0;`;
  el.textContent = asst.name[0];
  return el;
}

// ── Render ───────────────────────────────────────────────────────────────

function renderHeader() {
  const asst = getAssistant(state.selectedAssistant);
  document.getElementById('header-subtitle').textContent = asst ? `当前: ${asst.name}` : '';
  const wrap = document.getElementById('header-avatar-wrap');
  wrap.innerHTML = '';
  if (asst) {
    const av = avatarEl(asst, 40);
    av.style.borderRadius = '50%';
    wrap.appendChild(av);
  } else {
    wrap.innerHTML = `<div class="header-avatar-fallback"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg></div>`;
  }
}

function renderConvList() {
  const ul = document.getElementById('conv-list');
  ul.innerHTML = '';
  state.conversations.forEach(conv => {
    const btn = document.createElement('button');
    btn.className = 'conv-item' + (conv.id === state.activeConvId ? ' active' : '');
    btn.innerHTML = `
      <span class="conv-item-icon">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </span>
      <div class="conv-item-content">
        <div class="conv-item-title">${conv.title}</div>
        <div class="conv-item-time">${conv.time}</div>
        <div class="conv-item-assistant">${conv.assistant}</div>
      </div>`;
    btn.addEventListener('click', () => selectConv(conv.id));
    ul.appendChild(btn);
  });
}

function renderAssistantSelector() {
  const wrap = document.getElementById('assistant-selector');
  wrap.innerHTML = '';
  ASSISTANTS.forEach(asst => {
    const btn = document.createElement('button');
    btn.className = 'btn-assistant' + (asst.id === state.selectedAssistant ? ' active' : '');
    const av = avatarEl(asst, 28);
    btn.appendChild(av);
    const label = document.createElement('span');
    label.textContent = asst.name;
    btn.appendChild(label);
    btn.addEventListener('click', () => selectAssistant(asst.id));
    wrap.appendChild(btn);
  });
}

function renderMessages() {
  const msgs = state.messagesByConv[state.activeConvId] || [];
  const empty = document.getElementById('msg-empty');
  const list  = document.getElementById('message-list');
  const asst  = getAssistant(state.selectedAssistant);

  if (!msgs.length) {
    empty.style.display = 'flex';
    list.style.display  = 'none';
    return;
  }
  empty.style.display = 'none';
  list.style.display  = 'flex';
  list.innerHTML = '';

  msgs.forEach(msg => {
    const wrapper = document.createElement('div');

    // Message row
    const row = document.createElement('div');
    row.className = 'msg-row' + (msg.role === 'user' ? ' user' : '');

    // Avatar
    const avWrap = document.createElement('div');
    avWrap.className = 'msg-avatar ' + (msg.role === 'user' ? 'user-av' : 'bot-av');
    if (msg.role === 'user') {
      avWrap.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="5"/><path d="M20 21a8 8 0 1 0-16 0"/></svg>`;
    } else if (asst) {
      const av = avatarEl(asst, 32);
      avWrap.appendChild(av);
    } else {
      avWrap.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>`;
    }

    // Body
    const body = document.createElement('div');
    body.className = 'msg-body';
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble ' + msg.role;
    bubble.textContent = msg.content;
    const time = document.createElement('div');
    time.className = 'msg-time';
    time.textContent = msg.time;
    body.appendChild(bubble);
    body.appendChild(time);

    row.appendChild(avWrap);
    row.appendChild(body);
    wrapper.appendChild(row);

    // Suggested questions
    if (msg.suggested && msg.suggested.length) {
      const sq = document.createElement('div');
      sq.className = 'suggested-questions';
      const spacer = document.createElement('div');
      spacer.className = 'sq-spacer';
      const sqList = document.createElement('div');
      sqList.className = 'sq-list';
      const label = document.createElement('div');
      label.className = 'sq-label';
      label.textContent = '您可能还想问:';
      sqList.appendChild(label);
      msg.suggested.forEach(q => {
        const btn = document.createElement('button');
        btn.className = 'btn-sq';
        btn.innerHTML = `<span>${q}</span><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>`;
        btn.addEventListener('click', () => sendMessage(q));
        sqList.appendChild(btn);
      });
      sq.appendChild(spacer);
      sq.appendChild(sqList);
      wrapper.appendChild(sq);
    }

    list.appendChild(wrapper);
  });

  // Scroll to bottom
  const area = document.getElementById('message-area');
  area.scrollTop = area.scrollHeight;
}

// ── Actions ──────────────────────────────────────────────────────────────

function selectAssistant(id) {
  state.selectedAssistant = id;
  renderHeader();
  renderAssistantSelector();
}

function selectConv(id) {
  state.activeConvId = id;
  renderConvList();
  renderMessages();
}

function newConversation() {
  const id = 'conv-' + Date.now();
  const asst = getAssistant(state.selectedAssistant);
  state.conversations.unshift({
    id,
    title: '新对话',
    time: nowDateTime(),
    assistant: asst ? asst.name : '助手',
  });
  state.messagesByConv[id] = [];
  state.activeConvId = id;
  renderConvList();
  renderMessages();
}

function sendMessage(content) {
  if (!content.trim()) return;

  if (!state.messagesByConv[state.activeConvId]) {
    state.messagesByConv[state.activeConvId] = [];
  }
  const msgs = state.messagesByConv[state.activeConvId];

  // Update conv title on first message
  if (msgs.length === 0) {
    const conv = state.conversations.find(c => c.id === state.activeConvId);
    if (conv) conv.title = content.slice(0,30) + (content.length > 30 ? '…' : '');
    renderConvList();
  }

  msgs.push({ id:'m'+Date.now(), role:'user', content, time: nowTime() });
  renderMessages();

  // Simulate reply
  setTimeout(() => {
    const suggested = SUGGESTED[state.selectedAssistant] || DEFAULT_SUGGESTED;
    msgs.push({
      id:'m'+Date.now(),
      role:'assistant',
      content:'感谢您的提问。我正在为您分析相关信息…\n\n基于您的需求,我建议关注以下几个关键方面,这将有助于解决您提出的问题。我会根据公交行业的最佳实践,为您提供专业的建议和解决方案。',
      time: nowTime(),
      suggested,
    });
    renderMessages();
  }, 900);
}

// ── Input wiring ─────────────────────────────────────────────────────────
const inputEl  = document.getElementById('chat-input');
const sendBtn  = document.getElementById('btn-send');
const micBtn   = document.getElementById('btn-mic');
const recInd   = document.getElementById('recording-indicator');

inputEl.addEventListener('input', () => {
  sendBtn.disabled = !inputEl.value.trim();
});

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!sendBtn.disabled) {
      sendMessage(inputEl.value.trim());
      inputEl.value = '';
      sendBtn.disabled = true;
    }
  }
});

sendBtn.addEventListener('click', () => {
  if (!sendBtn.disabled) {
    sendMessage(inputEl.value.trim());
    inputEl.value = '';
    sendBtn.disabled = true;
  }
});

micBtn.addEventListener('click', () => {
  state.isRecording = !state.isRecording;
  if (state.isRecording) {
    micBtn.classList.add('recording');
    micBtn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="2" y1="2" x2="22" y2="22"/><path d="M18.89 13.23A7.12 7.12 0 0 0 19 12v-2"/><path d="M5 10v2a7 7 0 0 0 12 5"/><path d="M15 9.34V5a3 3 0 0 0-5.68-1.33"/><path d="M9 9v3a3 3 0 0 0 5.12 2.12"/><line x1="12" y1="19" x2="12" y2="22"/></svg>`;
    recInd.style.display = 'flex';
    micBtn.title = '停止录音';
  } else {
    micBtn.classList.remove('recording');
    micBtn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>`;
    recInd.style.display = 'none';
    micBtn.title = '语音输入';
  }
});

document.getElementById('btn-new-conv').addEventListener('click', newConversation);

// ── Initial render ────────────────────────────────────────────────────────
renderHeader();
renderConvList();
renderAssistantSelector();
renderMessages();
</script>
</body>
</html>
